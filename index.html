<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maharaja Hotel & Family Restaurant — Charkhi Dadri</title>
<meta name="description" content="100% pure vegetarian hotel & family restaurant in Charkhi Dadri. Breakfast, lunch, dinner, event halls, and comfortable rooms. Rated 4.7 by 153 guests.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C1410;
    --cream:#F7F2EA;
    --cream-dim:#EFE7D8;
    --gold:#C9A24B;
    --gold-soft:#DCC183;
    --brown:#3A2C22;
    --brown-soft:#5A4736;
    --bronze:#8C7355;
    --line: rgba(201,162,75,0.28);
    --shadow: 0 20px 50px -20px rgba(28,20,16,0.45);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--ink);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4,.serif{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    letter-spacing:0.01em;
    color:var(--ink);
  }
  a{text-decoration:none;color:inherit;}
  img{display:block;max-width:100%;height:auto;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  ul{list-style:none;}
  .container{max-width:1180px;margin:0 auto;padding:0 24px;}
  .eyebrow{
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:"";
    width:22px;height:1px;
    background:var(--gold);
    display:inline-block;
  }
  @media(prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  /* ---------- Crest / Monogram signature ---------- */
  .crest{
    width:56px;height:56px;
    border:1px solid var(--gold);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;
    font-size:22px;
    color:var(--gold);
    position:relative;
    flex-shrink:0;
  }
  .crest::before,.crest::after{
    content:"";
    position:absolute;
    width:7px;height:1px;
    background:var(--gold);
  }
  .crest::before{ left:-13px; }
  .crest::after{ right:-13px; }

  /* ---------- Reveal on scroll ---------- */
  .reveal{
    opacity:0;
    transform:translateY(28px);
    transition:opacity 0.9s cubic-bezier(.22,1,.36,1), transform 0.9s cubic-bezier(.22,1,.36,1);
  }
  .reveal.in{opacity:1;transform:translateY(0);}
  .reveal-delay-1{transition-delay:0.08s;}
  .reveal-delay-2{transition-delay:0.16s;}
  .reveal-delay-3{transition-delay:0.24s;}

  /* ---------- NAV ---------- */
  .nav{
    position:fixed;top:0;left:0;right:0;
    z-index:100;
    padding:18px 0;
    transition:background 0.4s ease, padding 0.4s ease, box-shadow 0.4s ease;
  }
  .nav.scrolled{
    background:rgba(28,20,16,0.92);
    backdrop-filter:blur(10px);
    padding:12px 0;
    box-shadow:0 8px 24px rgba(0,0,0,0.18);
  }
  .nav .container{display:flex;align-items:center;justify-content:space-between;gap:20px;}
  .brand{display:flex;align-items:center;gap:16px;color:#fff;}
  .brand .crest{width:40px;height:40px;font-size:17px;border-color:var(--gold);}
  .brand .crest::before,.brand .crest::after{display:none;}
  .brand-text{line-height:1.15;}
  .brand-text .name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:#fff;}
  .brand-text .sub{font-size:9.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-soft);}
  .nav-links{display:flex;align-items:center;gap:34px;}
  .nav-links a{
    color:#EDE3D2;
    font-size:14px;
    font-weight:500;
    position:relative;
    padding:4px 0;
  }
  .nav-links a::after{
    content:"";position:absolute;left:0;bottom:0;
    width:0;height:1px;background:var(--gold);
    transition:width 0.3s ease;
  }
  .nav-links a:hover::after, .nav-links a.active::after{width:100%;}
  .nav-cta{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--gold);
    color:var(--ink);
    padding:10px 20px;
    border-radius:2px;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.02em;
    transition:background 0.3s ease, transform 0.3s ease;
  }
  .nav-cta:hover{background:var(--gold-soft);transform:translateY(-1px);}
  .nav-toggle{
    display:none;
    width:38px;height:38px;
    align-items:center;justify-content:center;
    color:#fff;
  }
  .nav-toggle svg{width:22px;height:22px;}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    padding:15px 30px;
    font-size:14px;font-weight:600;letter-spacing:0.03em;
    border-radius:2px;
    transition:transform 0.35s cubic-bezier(.22,1,.36,1), background 0.3s ease, box-shadow 0.3s ease, color 0.3s ease;
    white-space:nowrap;
  }
  .btn-primary{
    background:var(--gold);
    color:var(--ink);
    box-shadow:0 14px 30px -12px rgba(201,162,75,0.55);
  }
  .btn-primary:hover{transform:translateY(-3px);box-shadow:0 18px 36px -12px rgba(201,162,75,0.65);}
  .btn-outline{
    background:transparent;
    color:#fff;
    border:1px solid rgba(255,255,255,0.55);
  }
  .btn-outline:hover{border-color:#fff;background:rgba(255,255,255,0.08);transform:translateY(-3px);}
  .btn-dark{
    background:var(--ink);
    color:var(--cream);
  }
  .btn-dark:hover{background:var(--brown);transform:translateY(-3px);}
  .btn-ghost-dark{
    background:transparent;
    color:var(--ink);
    border:1px solid rgba(28,20,16,0.25);
  }
  .btn-ghost-dark:hover{border-color:var(--ink);transform:translateY(-3px);}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    height:100vh;
    min-height:640px;
    display:flex;
    align-items:flex-end;
    overflow:hidden;
    color:#fff;
  }
  .hero-bg{
    position:absolute;inset:0;
    background-size:cover;background-position:center 30%;
    transform:scale(1.12);
    will-change:transform;
  }
  .hero-overlay{
    position:absolute;inset:0;
    background:
      linear-gradient(180deg, rgba(15,10,8,0.55) 0%, rgba(15,10,8,0.35) 38%, rgba(12,8,6,0.92) 100%);
  }
  .hero-content{
    position:relative;z-index:2;
    width:100%;
    padding-bottom:88px;
  }
  .hero-eyebrow{
    color:var(--gold-soft);
  }
  .hero h1{
    font-size:clamp(40px, 7vw, 78px);
    line-height:1.03;
    margin:18px 0 20px;
    color:#fff;
    max-width:780px;
  }
  .hero h1 em{
    font-style:italic;
    color:var(--gold-soft);
  }
  .hero p{
    font-size:clamp(15px,1.6vw,18px);
    color:#E8DFD0;
    max-width:520px;
    line-height:1.6;
    margin-bottom:34px;
  }
  .hero-actions{display:flex;gap:16px;flex-wrap:wrap;}
  .hero-scroll{
    position:absolute;
    right:24px;bottom:28px;
    z-index:2;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    color:rgba(255,255,255,0.7);
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
  }
  .hero-scroll .line{
    width:1px;height:46px;
    background:linear-gradient(180deg, rgba(255,255,255,0.8), transparent);
    animation:scrollPulse 2.2s ease-in-out infinite;
  }
  @keyframes scrollPulse{
    0%,100%{opacity:0.3;}
    50%{opacity:1;}
  }

  /* ---------- Highlights strip ---------- */
  .strip{
    background:var(--ink);
    color:var(--cream);
    padding:30px 0;
  }
  .strip-row{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:22px;
  }
  .strip-item{
    display:flex;align-items:center;gap:12px;
    flex:1 1 220px;
    min-width:0;
  }
  .strip-item .ic{
    width:38px;height:38px;flex-shrink:0;
    border:1px solid var(--line);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);
  }
  .strip-item .ic svg{width:17px;height:17px;}
  .strip-item .label{font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--bronze);margin-bottom:2px;}
  .strip-item .val{font-size:15px;font-weight:600;color:#fff;font-family:'Inter',sans-serif;}
  .strip-divider{
    width:1px;height:40px;
    background:var(--line);
    flex-shrink:0;
  }
  @media(max-width:900px){ .strip-divider{display:none;} }

  /* ---------- Section basics ---------- */
  section{position:relative;}
  .section-pad{padding:110px 0;}
  .section-pad-sm{padding:80px 0;}
  .section-head{max-width:640px;margin-bottom:56px;}
  .section-head.center{margin-left:auto;margin-right:auto;text-align:center;}
  .section-head h2{font-size:clamp(32px,4.2vw,50px);margin-top:16px;line-height:1.08;}
  .section-head p{color:var(--bronze);font-size:16px;line-height:1.7;margin-top:18px;}

  .on-dark{background:var(--ink);color:var(--cream);}
  .on-dark .section-head p{color:#C9BBA6;}
  .on-dark .eyebrow{color:var(--gold);}
  .on-dark h2{color:#fff;}

  /* ---------- About intro (Home) ---------- */
  .intro-grid{
    display:grid;
    grid-template-columns:0.9fr 1.1fr;
    gap:64px;
    align-items:center;
  }
  .intro-media{position:relative;}
  .intro-media img{
    border-radius:3px;
    box-shadow:var(--shadow);
    width:100%;
    height:480px;
    object-fit:cover;
  }
  .intro-media .badge{
    position:absolute;
    bottom:-26px;left:-26px;
    background:var(--gold);
    color:var(--ink);
    padding:20px 24px;
    border-radius:3px;
    box-shadow:0 16px 32px -10px rgba(201,162,75,0.5);
  }
  .intro-media .badge .num{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;line-height:1;}
  .intro-media .badge .txt{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;font-weight:600;}
  .intro-text p{font-size:16.5px;line-height:1.85;color:var(--brown-soft);margin-bottom:18px;}
  @media(max-width:860px){
    .intro-grid{grid-template-columns:1fr;gap:70px;}
    .intro-media .badge{left:16px;bottom:-22px;}
  }

  /* ---------- Offer cards ---------- */
  .offer-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:2px;
    background:var(--line);
    border:1px solid var(--line);
  }
  .offer-card{
    background:var(--cream);
    padding:44px 34px;
    transition:background 0.4s ease, transform 0.4s ease;
  }
  .offer-card:hover{background:#fff;transform:translateY(-4px);}
  .offer-card .ic{
    width:50px;height:50px;
    border-radius:50%;
    border:1px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);
    margin-bottom:24px;
  }
  .offer-card .ic svg{width:22px;height:22px;}
  .offer-card h3{font-size:23px;margin-bottom:12px;}
  .offer-card p{font-size:14.5px;color:var(--bronze);line-height:1.7;}
  @media(max-width:760px){ .offer-grid{grid-template-columns:1fr;} }

  /* ---------- Gallery ---------- */
  .gallery-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:200px 200px;
    gap:8px;
  }
  .gallery-grid a{
    position:relative;
    overflow:hidden;
    border-radius:2px;
    display:block;
  }
  .gallery-grid img{
    width:100%;height:100%;object-fit:cover;
    transition:transform 0.7s cubic-bezier(.22,1,.36,1);
  }
  .gallery-grid a:hover img{transform:scale(1.08);}
  .gallery-grid a::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.45) 100%);
    opacity:0;transition:opacity 0.4s ease;
  }
  .gallery-grid a:hover::after{opacity:1;}
  .g-span2{grid-column:span 2;}
  .g-rspan2{grid-row:span 2;}
  @media(max-width:760px){
    .gallery-grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(4,160px);}
    .g-rspan2{grid-row:span 1;}
    .g-span2{grid-column:span 2;}
  }

  /* ---------- Instagram ---------- */
  .insta-card{
    display:flex;align-items:center;justify-content:space-between;
    gap:30px;
    background:linear-gradient(135deg, var(--brown) 0%, var(--ink) 100%);
    border-radius:4px;
    padding:48px 52px;
    flex-wrap:wrap;
  }
  .insta-card .left{display:flex;align-items:center;gap:20px;}
  .insta-ic{
    width:56px;height:56px;border-radius:50%;
    background:linear-gradient(135deg,#f9ce34,#ee2a7b 55%,#6228d7);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .insta-ic svg{width:26px;height:26px;color:#fff;}
  .insta-card h3{color:#fff;font-size:24px;}
  .insta-card .handle{color:var(--gold-soft);font-size:14px;margin-top:4px;}
  .insta-strip{
    display:grid;grid-template-columns:repeat(6,1fr);
    gap:8px;margin-top:28px;
  }
  .insta-strip img{
    width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:2px;
    transition:transform 0.4s ease, opacity 0.4s ease;
  }
  .insta-strip a:hover img{transform:scale(1.05);opacity:0.85;}
  @media(max-width:760px){ .insta-strip{grid-template-columns:repeat(3,1fr);} .insta-card{padding:36px 26px;} }

  /* ---------- Footer ---------- */
  footer{
    background:var(--ink);
    color:#C9BBA6;
    padding:70px 0 0;
  }
  .footer-grid{
    display:grid;
    grid-template-columns:1.4fr 1fr 1fr 1fr;
    gap:50px;
    padding-bottom:50px;
    border-bottom:1px solid var(--line);
  }
  .footer-brand .brand-text .name{color:#fff;}
  .footer-brand p{font-size:14px;line-height:1.8;margin-top:18px;color:#A99A85;max-width:300px;}
  .footer-col h4{
    color:#fff;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;
    font-family:'Inter',sans-serif;font-weight:600;margin-bottom:20px;
  }
  .footer-col ul li{margin-bottom:13px;font-size:14.5px;}
  .footer-col ul li a:hover{color:var(--gold);}
  .footer-col ul li.muted{color:#8A7C68;}
  .footer-bottom{
    display:flex;justify-content:space-between;align-items:center;
    padding:26px 0;
    font-size:12.5px;color:#73685A;
    flex-wrap:wrap;gap:10px;
  }
  @media(max-width:860px){
    .footer-grid{grid-template-columns:1fr 1fr;}
  }
  @media(max-width:520px){
    .footer-grid{grid-template-columns:1fr;}
  }

  /* ---------- Sticky mobile CTA bar ---------- */
  .mobile-bar{
    display:none;
    position:fixed;left:0;right:0;bottom:0;z-index:90;
    background:var(--ink);
    border-top:1px solid var(--line);
    padding:10px 14px;
    padding-bottom:max(10px, env(safe-area-inset-bottom));
  }
  .mobile-bar .row{display:flex;gap:10px;}
  .mobile-bar a{
    flex:1;
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 10px;
    font-size:13px;font-weight:600;
    border-radius:2px;
  }
  .mobile-bar .call{background:var(--gold);color:var(--ink);}
  .mobile-bar .dir{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3);}
  @media(max-width:760px){ .mobile-bar{display:block;} body{padding-bottom:64px;} }

  /* ---------- Page header (inner pages) ---------- */
  .page-header{
    position:relative;
    padding:170px 0 90px;
    color:#fff;
    overflow:hidden;
  }
  .page-header-bg{
    position:absolute;inset:0;background-size:cover;background-position:center;
  }
  .page-header-overlay{
    position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(15,10,8,0.78), rgba(15,10,8,0.88));
  }
  .page-header .container{position:relative;z-index:2;}
  .page-header h1{font-size:clamp(36px,5.5vw,58px);margin-top:16px;color:#fff;}
  .page-header p{color:#D8CCB8;max-width:560px;margin-top:16px;font-size:16px;line-height:1.7;}
  .crumbs{display:flex;gap:8px;align-items:center;font-size:13px;color:#B7A88F;margin-top:24px;}
  .crumbs a:hover{color:var(--gold);}

  /* ---------- Menu page ---------- */
  .menu-toggle{
    display:flex;gap:0;
    border:1px solid var(--ink);
    border-radius:2px;
    overflow:hidden;
    width:fit-content;
    margin:0 auto 56px;
  }
  .menu-toggle button{
    padding:14px 38px;
    font-size:14px;font-weight:600;letter-spacing:0.04em;
    color:var(--ink);
    background:transparent;
    transition:background 0.3s ease, color 0.3s ease;
  }
  .menu-toggle button.active{background:var(--ink);color:var(--cream);}
  .menu-panel{display:none;}
  .menu-panel.active{display:block;animation:fadeUp 0.5s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  .veg-tag{
    display:inline-flex;align-items:center;gap:7px;
    font-size:11.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
    color:#2E7D32;
    background:rgba(46,125,50,0.08);
    border:1px solid rgba(46,125,50,0.3);
    padding:6px 14px;border-radius:20px;
  }
  .veg-dot{
    width:13px;height:13px;border:1.5px solid #2E7D32;border-radius:2px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .veg-dot::after{content:"";width:6px;height:6px;border-radius:50%;background:#2E7D32;}

  .menu-cat{margin-bottom:64px;}
  .menu-cat-head{
    display:flex;align-items:baseline;gap:18px;
    margin-bottom:26px;
    padding-bottom:14px;
    border-bottom:1px solid var(--line);
  }
  .menu-cat-head h3{font-size:27px;color:var(--ink);white-space:nowrap;}
  .menu-cat-head .count{font-size:12.5px;color:var(--bronze);letter-spacing:0.04em;}
  .menu-items{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px 40px;
  }
  .menu-item{
    display:flex;align-items:baseline;gap:8px;
    padding:9px 0;
    font-size:15.5px;
    color:var(--brown-soft);
  }
  .mi-left{display:flex;align-items:center;gap:12px;white-space:nowrap;flex-shrink:0;}
  .mi-dots{
    flex:1 1 auto;
    border-bottom:1.5px dotted var(--line);
    margin-bottom:5px;
    min-width:16px;
  }
  .mi-price{
    flex-shrink:0;
    font-weight:600;
    color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  @media(max-width:700px){ .menu-items{grid-template-columns:1fr;} }

  .bev-note{
    text-align:center;
    background:var(--cream-dim);
    border:1px dashed var(--gold);
    border-radius:4px;
    padding:60px 40px;
    max-width:640px;margin:0 auto;
  }
  .bev-note h3{font-size:26px;margin-bottom:14px;}
  .bev-note p{color:var(--bronze);font-size:15.5px;line-height:1.7;margin-bottom:26px;}

  /* ---------- About page ---------- */
  .trust-strip{
    display:grid;grid-template-columns:repeat(4,1fr);
    border:1px solid var(--line);
  }
  .trust-item{
    padding:36px 24px;text-align:center;
    border-right:1px solid var(--line);
  }
  .trust-item:last-child{border-right:none;}
  .trust-item .num{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;color:var(--gold);}
  .trust-item .lbl{font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:var(--bronze);margin-top:6px;}
  @media(max-width:700px){ .trust-strip{grid-template-columns:repeat(2,1fr);} .trust-item{border-bottom:1px solid var(--line);} }

  .event-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  .event-card{
    background:var(--ink);color:#fff;
    padding:34px 24px;border-radius:3px;
    transition:transform 0.4s ease;
  }
  .event-card:hover{transform:translateY(-6px);}
  .event-card .ic{color:var(--gold);margin-bottom:18px;}
  .event-card .ic svg{width:26px;height:26px;}
  .event-card h4{color:#fff;font-size:19px;margin-bottom:8px;}
  .event-card p{font-size:13px;color:#B7A88F;line-height:1.6;}
  @media(max-width:860px){ .event-grid{grid-template-columns:repeat(2,1fr);} }

  .room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .room-card img{height:260px;object-fit:cover;border-radius:3px;width:100%;}
  .room-card .cap{padding-top:16px;font-size:14.5px;color:var(--bronze);}
  @media(max-width:860px){ .room-grid{grid-template-columns:1fr;} }

  /* ---------- Visit page ---------- */
  .visit-grid{
    display:grid;grid-template-columns:1.1fr 0.9fr;gap:60px;align-items:start;
  }
  .visit-info-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:4px;
    padding:38px;
    margin-bottom:20px;
  }
  .visit-info-card h4{
    display:flex;align-items:center;gap:12px;
    font-size:13px;letter-spacing:0.06em;text-transform:uppercase;
    color:var(--bronze);font-family:'Inter',sans-serif;font-weight:600;margin-bottom:14px;
  }
  .visit-info-card .ic{
    width:34px;height:34px;border-radius:50%;
    background:var(--cream-dim);color:var(--gold);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .visit-info-card .ic svg{width:16px;height:16px;}
  .visit-info-card p{font-size:16.5px;color:var(--ink);line-height:1.6;font-family:'Cormorant Garamond',serif;font-weight:500;}
  .visit-info-card .tip{font-size:13px;color:var(--bronze);margin-top:8px;font-family:'Inter',sans-serif;}
  .call-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;}
  .map-frame{
    width:100%;height:480px;
    border:0;border-radius:4px;
    box-shadow:var(--shadow);
  }
  @media(max-width:900px){ .visit-grid{grid-template-columns:1fr;} .map-frame{height:340px;} }

  .form-wrap{
    background:#fff;border:1px solid var(--line);border-radius:4px;padding:40px;
  }
  .form-row{margin-bottom:20px;}
  .form-row label{
    display:block;font-size:12.5px;letter-spacing:0.05em;text-transform:uppercase;
    color:var(--bronze);margin-bottom:8px;font-weight:600;
  }
  .form-row input, .form-row textarea{
    width:100%;
    border:1px solid var(--line);
    background:var(--cream-dim);
    padding:13px 16px;
    font-size:15px;
    font-family:'Inter',sans-serif;
    border-radius:2px;
    color:var(--ink);
    transition:border-color 0.3s ease, background 0.3s ease;
  }
  .form-row input:focus, .form-row textarea:focus{
    outline:none;border-color:var(--gold);background:#fff;
  }
  .form-row textarea{resize:vertical;min-height:110px;}
  .form-note{font-size:12.5px;color:var(--bronze);margin-top:14px;text-align:center;}

  /* ---------- Misc utility ---------- */
  .flex-center{display:flex;align-items:center;justify-content:center;}
  .mt-40{margin-top:40px;}
  .text-center{text-align:center;}
  .divider-mark{
    width:1px;height:60px;background:var(--line);margin:0 auto 30px;
  }
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
</style>
</head>
